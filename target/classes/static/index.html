<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Tasker — планирование</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/frappe-gantt@1.2.2/dist/frappe-gantt.css"/>
    <link rel="stylesheet" href="/css/app.css"/>
</head>
<body>
<header class="top">
    <h1 class="brand">Tasker</h1>
    <nav class="tabs" role="tablist">
        <button type="button" class="tab active" data-view="kanban">Канбан</button>
        <button type="button" class="tab" data-view="gantt">Ганта</button>
    </nav>
</header>

<section class="toolbar">
    <div class="toolbar-row">
        <label class="field">
            Исполнитель
            <div class="field-inline">
                <select id="filterAssignee">
                    <option value="">Любой</option>
                </select>
                <button type="button" class="btn ghost mini" id="btnNewAssigneeFilter" title="Добавить исполнителя">+</button>
            </div>
        </label>
        <label class="field">
            Метки
            <div class="field-inline">
                <div class="select-multi" id="filterLabelMultiWrap">
                    <button type="button" class="select-multi-trigger" id="filterLabelMultiTrigger" aria-expanded="false">
                        Любые
                    </button>
                    <div class="select-multi-dropdown" id="filterLabelMultiDropdown" hidden>
                        <input type="search" class="select-multi-search" id="filterLabelMultiSearch"
                               placeholder="Поиск метки…" autocomplete="off"/>
                        <div class="select-multi-scroll" id="filterLabelMultiScroll"></div>
                    </div>
                </div>
            </div>
        </label>
        <button type="button" id="btnApplyFilters" class="btn primary">Применить</button>
        <button type="button" id="btnResetFilters" class="btn ghost">Сброс</button>
        <label class="field field-link-search">
            Ссылка
            <input type="search" id="filterLinkSearch" placeholder="фильтр по ссылке…" autocomplete="off"
                   spellcheck="false"/>
        </label>
        <span class="spacer"></span>
        <button type="button" id="btnGanttToggleCompleted" class="btn ghost btn-icon hidden"
                aria-label="Скрыть завершённые"
                title="Не показывать задачи со статусом «Готово» или прогрессом 100%">
            <svg class="icon-eye-open" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                 aria-hidden="true">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg class="icon-eye-off hidden" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                 aria-hidden="true">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
        </button>
        <button type="button" id="btnImportTasks" class="btn ghost btn-icon" aria-label="Импорт задач"
                title="Импорт задач из JSON">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M12 3v12"/>
                <path d="m8 7 4-4 4 4"/>
                <path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/>
            </svg>
        </button>
        <button type="button" id="btnRefresh" class="btn">Обновить</button>
        <button type="button" id="btnNewTask" class="btn accent">Новая задача</button>
    </div>
</section>

<main id="viewKanban" class="panel">
    <div class="columns" id="board"></div>
</main>

<main id="viewGantt" class="panel hidden">
    <div id="ganttHost" class="gantt-host"></div>
</main>

<dialog id="taskDialog" class="modal">
    <form method="dialog" id="taskForm" class="modal-body">
        <h2 id="taskDialogTitle">Задача</h2>
        <input type="hidden" id="taskId"/>
        <label>Заголовок <input id="fldTitle" required maxlength="500"/></label>
        <label>Описание <textarea id="fldDescription" rows="4"></textarea></label>
        <label>Ссылка <input id="fldLink" type="text" maxlength="2048" autocomplete="off" placeholder="https://…"/></label>
        <label>Вид
            <select id="fldKind">
                <option value="TASK">Обычная задача</option>
                <option value="MILESTONE">Веха (Гант)</option>
            </select>
        </label>
        <label id="wrapMilestoneDate" class="hidden">Контрольная дата (веха) <input id="fldMilestoneDate" type="date"/></label>
        <label>Статус
            <select id="fldStatus"></select>
        </label>
        <label class="field-assignee-task">
            Исполнитель
            <div class="field-inline">
                <select id="fldAssignee">
                    <option value="">Не назначен</option>
                </select>
                <button type="button" class="btn ghost mini" id="btnNewAssigneeTask" title="Добавить исполнителя">+</button>
            </div>
        </label>
        <label class="field-assignee-task">
            Метки
            <div class="field-inline">
                <div class="select-multi" id="labelMultiWrap">
                    <button type="button" class="select-multi-trigger" id="labelMultiTrigger" aria-expanded="false">
                        Выберите метки…
                    </button>
                    <div class="select-multi-dropdown" id="labelMultiDropdown" hidden>
                        <input type="search" class="select-multi-search" id="labelMultiSearch" placeholder="Поиск метки…"
                               autocomplete="off"/>
                        <div class="select-multi-scroll" id="labelMultiScroll"></div>
                    </div>
                </div>
                <button type="button" class="btn ghost mini" id="btnNewLabelTask" title="Добавить метку">+</button>
            </div>
        </label>
        <div id="wrapPlanDates" class="row two">
            <label>Дата начала (план) <input id="fldPlanStart" type="date"/></label>
            <label>Дата конца (план) <input id="fldPlanEnd" type="date"/></label>
        </div>
        <footer class="modal-actions">
            <button type="button" class="btn ghost" id="btnDeleteTask">Удалить</button>
            <span class="spacer"></span>
            <button type="button" class="btn" id="btnCancelTask">Отмена</button>
            <button type="button" class="btn accent" id="btnSaveTask">Сохранить</button>
        </footer>
    </form>
</dialog>

<dialog id="assigneeDialog" class="modal small">
    <form id="assigneeForm" class="modal-body">
        <h2>Новый исполнитель</h2>
        <label>ФИО / имя <input id="fldAssigneeName" required maxlength="200"/></label>
        <footer class="modal-actions">
            <button type="button" class="btn" id="btnCancelAssignee">Отмена</button>
            <button type="button" class="btn accent" id="btnSaveAssignee">Создать</button>
        </footer>
    </form>
</dialog>

<dialog id="labelDialog" class="modal small">
    <form id="labelForm" class="modal-body">
        <h2>Новая метка</h2>
        <label>Название <input id="fldLabelName" required maxlength="64"/></label>
        <label>Цвет <input id="fldLabelColor" type="color" value="#6b7280"/></label>
        <footer class="modal-actions">
            <button type="button" class="btn" id="btnCancelLabel">Отмена</button>
            <button type="button" class="btn accent" id="btnSaveLabel">Создать</button>
        </footer>
    </form>
</dialog>

<dialog id="importDialog" class="modal modal-import">
    <form method="dialog" id="importForm" class="modal-body">
        <h2>Импорт задач</h2>
        <p class="import-hint">Вставьте JSON-массив задач. Обновление: по полю <code>id</code> или по непустому <code>link</code> (если задача с такой ссылкой уже есть). Пустой <code>link</code> — всегда новая задача.</p>
        <label>JSON
            <textarea id="fldImportJson" class="import-json" rows="14" spellcheck="false"
                      placeholder='[{"title": "…", "status": "TODO"}]'></textarea>
        </label>
        <footer class="modal-actions">
            <span class="spacer"></span>
            <button type="button" class="btn" id="btnCancelImport">Отмена</button>
            <button type="button" class="btn accent" id="btnRunImport">Импортировать</button>
        </footer>
    </form>
</dialog>

<div id="toast" class="toast" hidden></div>

<script src="https://cdn.jsdelivr.net/npm/frappe-gantt@1.2.2/dist/frappe-gantt.umd.min.js"></script>
<script src="/js/app.js" defer></script>
</body>
</html>
